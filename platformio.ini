; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM3
lib_deps = 
	chris--a/Keypad@^3.1.1
	northernwidget/DS3231@^1.1.2
	mobizt/ESP_SSLClient@^3.1.3
	uipethernet/UIPEthernet@^2.0.12
build_src_filter = ${env.src_filter}-<mainDisplay.cpp>-<Display.cpp>-<HC05.cpp>-<mainPrinter.cpp>
board_build.partitions = partitions.csv
build_unflags = 
	-std=gnu++11
	-std=gnu11
	-std=gnu++14
	-std=gnu14
build_flags = 
	-D debug_mode
	-std=gnu++17
	-std=gnu17

[env:esp32_debug]
extends = env:esp32dev
build_unflags = 
	-std=gnu++11
	-std=gnu11
	-std=gnu++14
	-std=gnu14
build_flags = 
	-D debug_mode
	-std=gnu++17
	-std=gnu17

[env:esp32_release]
extends = env:esp32dev
build_unflags = 
	-std=gnu++11
	-std=gnu11
	-std=gnu++14
	-std=gnu14
build_flags = 
	-std=gnu++17
	-std=gnu17
;lib_deps = uipethernet/UIPEthernet@^2.0.12

[env:display]
platform = atmelavr
framework = arduino
board_build.f_cpu = 8000000L
build_src_filter = ${env.src_filter}-<main.cpp>-<LLS.cpp>-<HC05.cpp>-<I2C_Master_Device.cpp>-<Keypad_I2C.cpp>-<MT124.cpp>-<Printer.cpp>-<Screen.cpp>-<Smartone.cpp>-<SPI_Device.cpp>-<State.cpp>-<mainPrinter.cpp>-<SD_Card.cpp>-<Peripehals.cpp>-<w5100.cpp>-<Ethernet.cpp>-<EthernetClient.cpp>-<Dns.cpp>-<Dhcp.cpp>-<Printer.cpp>-<Ethernet_HTTP.cpp>-<Ethernet_SocketIO.cpp>-<Ethernet_WebSocket.cpp>-<Logger.cpp>-<Global_Client.cpp>-<json_parser.cpp>

[env:display_debug]
extends = env:display
board = ATmega328P

[env:display_release]
extends = env:display
board = ATmega328PB

[env:printer]
platform = atmelavr
framework = arduino
board_build.f_cpu = 8000000L
build_src_filter = ${env.src_filter}-<main.cpp>-<LLS.cpp>-<I2C_Master_Device.cpp>-<Keypad_I2C.cpp>-<MT124.cpp>-<Screen.cpp>-<Smartone.cpp>-<SPI_Device.cpp>-<State.cpp>-<mainDisplay.cpp>-<SD_Card.cpp>-<Peripehals.cpp>-<w5100.cpp>-<Ethernet.cpp>-<EthernetClient.cpp>-<Dns.cpp>-<Dhcp.cpp>-<Printer.cpp>-<Ethernet_HTTP.cpp>-<Ethernet_WebSocket.cpp>-<Logger.cpp>-<Ethernet_SocketIO.cpp>-<Global_Client.cpp>-<json_parser.cpp>

[env:printer_debug]
extends = env:printer
board = ATmega328P

[env:printer_release]
extends = env:printer
board = ATmega328PB


